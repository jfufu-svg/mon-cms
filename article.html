<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CMS Studio — Article</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8f7f4; --surface: #ffffff; --border: #e2ddd6;
      --text: #1a1814; --text-muted: #8a8278;
      --accent: #2c5282; --accent-light: #ebf0f8;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Source Serif 4', Georgia, serif;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
      --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
      --radius: 6px;
    }
    html { font-size: 15px; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* HEADER */
    .site-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
    .logo { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; }
    .back-link { font-family: var(--font-body); font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-decoration: none; padding: 0.38rem 0.8rem; border-radius: var(--radius); border: 1px solid var(--border); transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.4rem; }
    .back-link:hover { background: var(--bg); color: var(--text); border-color: #bbb; }

    /* ARTICLE */
    .article-wrapper { max-width: 1200px; margin: 1.5rem auto 3rem; padding: 0 2rem; width: 100%; animation: fadeIn 0.35s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

    .article-cover { width: 100%; aspect-ratio: 21/9; object-fit: cover; border-radius: var(--radius); margin-bottom: 2.5rem; display: block; box-shadow: var(--shadow-lg); }

    .article-meta { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.7rem; flex-wrap: wrap; }
    .article-category { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 0.22rem 0.6rem; border-radius: 3px; color: #fff; }
    .article-date { font-size: 0.82rem; color: var(--text-muted); font-style: italic; }

    .article-title { font-family: var(--font-display); font-size: 2rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.5rem; }
    .article-subtitle { font-size: 1rem; color: var(--text-muted); font-style: italic; font-weight: 300; margin-bottom: 1.2rem; line-height: 1.5; }

    .article-byline { display: flex; align-items: center; gap: 0.8rem; padding: 0.7rem 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; flex-wrap: wrap; }
    .byline-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent-light); border: 2px solid #c2d4ee; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; color: var(--accent); flex-shrink: 0; }
    .byline-name { font-size: 0.88rem; font-weight: 600; }
    .byline-date { font-size: 0.78rem; color: var(--text-muted); font-style: italic; }
    .byline-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-left: auto; }
    .tag-pill { font-size: 0.62rem; font-weight: 600; background: var(--accent-light); color: var(--accent); padding: 2px 7px; border-radius: 3px; }

    /* CONTENT */
    .article-content p { font-size: 0.95rem; line-height: 1.65; margin-bottom: 0.9rem; }
    .article-content h1 { font-family: var(--font-display); font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; margin: 1.8rem 0 0.5rem; }
    .article-content h2 { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; margin: 1.4rem 0 0.45rem; }
    .article-content h3 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; margin: 1.1rem 0 0.4rem; }
    .article-content h4 { font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; margin: 0.9rem 0 0.3rem; }
    .article-content ul, .article-content ol { margin-bottom: 0.9rem; padding-left: 1.5rem; line-height: 1.65; }
    .article-content li { margin-bottom: 0.2rem; font-size: 0.95rem; }
    .article-content blockquote { border-left: 3px solid var(--accent); padding: 0.15rem 0 0.15rem 1rem; margin: 1.2rem 0; font-style: italic; color: #444; font-size: 1rem; line-height: 1.55; }
    .article-content blockquote cite { display: block; font-size: 0.78rem; font-style: normal; color: var(--text-muted); margin-top: 0.35rem; }
    .article-content pre { background: #1e2433; color: #e2e8f0; padding: 0.9rem 1rem; border-radius: var(--radius); font-size: 0.85rem; overflow-x: auto; margin-bottom: 0.9rem; font-family: 'Courier New', monospace; line-height: 1.5; }
    .article-content img { max-width: 100%; border-radius: var(--radius); display: block; margin: 0.5rem 0; }
    .article-content figure { margin-bottom: 0.9rem; }
    .article-content figcaption { font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 0.3rem; font-style: italic; }
    .article-content table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: 0.88rem; }
    .article-content th { background: var(--bg); font-weight: 600; text-align: left; }
    .article-content th, .article-content td { border: 1px solid var(--border); padding: 0.3rem 0.65rem; }
    .article-content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .article-content .warning-block { background: #fffbec; border: 1px solid #f0d78c; border-radius: var(--radius); padding: 0.6rem 0.85rem; margin-bottom: 0.9rem; }
    .article-content .warning-block strong { display: block; margin-bottom: 0.2rem; }
    .article-content .checklist { list-style: none; padding: 0; margin-bottom: 0.9rem; }
    .article-content .checklist li { display: flex; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.3rem; font-size: 0.95rem; line-height: 1.5; }
    .article-content .checklist li.checked { color: var(--text-muted); text-decoration: line-through; }
    .article-content .checklist li::before { content: '○'; color: #bbb; flex-shrink: 0; margin-top: 2px; font-size: 0.82rem; }
    .article-content .checklist li.checked::before { content: '●'; color: var(--accent); }

    /* SECTION TABS */
    .section-tabs-bar { margin: 1.5rem 0 0; }
    .section-tabs-nav { display: flex; gap: 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--bg); }
    .section-tab-btn { flex: 1; font-family: var(--font-body); font-size: 0.78rem; font-weight: 600; padding: 0.55rem 0.5rem; border: none; border-right: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; text-align: center; }
    .section-tab-btn:last-child { border-right: none; }
    .section-tab-btn:hover { background: var(--accent-light); color: var(--accent); }
    .section-tab-btn.active { background: var(--accent); color: #fff; }
    .section-pane { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .section-pane.active { display: block; }
    .section-pane-title { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.6rem; }

    /* DOCUMENTS TAB */
    .doc-download-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .doc-download-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.65rem 0.9rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); text-decoration: none; color: var(--text); transition: all 0.15s; }
    .doc-download-item:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(44,82,130,0.1); transform: translateY(-1px); }
    .doc-download-icon { font-size: 1.3rem; flex-shrink: 0; }
    .doc-download-info { flex: 1; min-width: 0; }
    .doc-download-name { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-download-size { font-size: 0.72rem; color: var(--text-muted); margin-top: 1px; }
    .doc-download-btn { font-size: 0.72rem; font-weight: 600; color: var(--accent); background: var(--accent-light); padding: 0.25rem 0.65rem; border-radius: 3px; white-space: nowrap; flex-shrink: 0; }

    /* NOT FOUND */
    .not-found { text-align: center; padding: 5rem 2rem; color: var(--text-muted); }
    .not-found h2 { font-family: var(--font-display); font-size: 1.8rem; color: var(--text); margin-bottom: 0.6rem; }
    .not-found p { font-style: italic; margin-bottom: 1.5rem; }
    .btn-back { font-family: var(--font-body); font-size: 0.82rem; font-weight: 600; padding: 0.5rem 1.1rem; border-radius: var(--radius); background: var(--accent); color: #fff; border: none; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: background 0.15s; }
    .btn-back:hover { background: #1e3a5f; }

    /* FOOTER */
    .site-footer { margin-top: auto; background: var(--surface); border-top: 1px solid var(--border); text-align: center; padding: 1.2rem; font-size: 0.75rem; color: var(--text-muted); font-style: italic; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    @media (max-width: 600px) {
      .article-title { font-size: 1.8rem; }
      .article-wrapper { margin-top: 2rem; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="blog.html" class="logo"><span class="logo-dot"></span>CMS Studio</a>
  <div style="display:flex;align-items:center;gap:0.5rem;">
    <button id="pdfBtn" onclick="downloadPDF()" class="back-link" style="border-color:var(--accent);color:var(--accent);background:var(--accent-light);cursor:pointer;font-family:var(--font-body);">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Télécharger PDF
    </button>
    <a href="blog.html" class="back-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Retour aux articles
    </a>
  </div>
</header>

<div id="articleWrapper"></div>

<footer class="site-footer">CMS Studio &mdash; Tous droits réservés</footer>

<script>
(function() {
'use strict';

var CAT_COLORS = {
  'Technologie': '#2563eb', 'Design': '#7c3aed', 'Culture': '#b45309',
  'Sciences': '#065f46', 'Societe': '#9d174d', 'Economie': '#1d4ed8'
};

function getDocIcon(type) {
  type = type || '';
  if (type.includes('pdf')) return '📄';
  if (type.includes('word') || type.includes('document')) return '📝';
  if (type.includes('excel') || type.includes('sheet') || type.includes('csv')) return '📊';
  if (type.includes('powerpoint') || type.includes('presentation')) return '📑';
  if (type.includes('image')) return '🖼️';
  if (type.includes('zip') || type.includes('rar')) return '🗜️';
  if (type.includes('text')) return '📃';
  return '📎';
}

function formatDocSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' o';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' Ko';
  return (bytes/(1024*1024)).toFixed(1) + ' Mo';
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(str) {
  if (!str) return '';
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  try { var d = new Date(str); return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear(); }
  catch(e) { return str; }
}

function initials(name) {
  return String(name||'R').split(' ').map(function(w){ return w[0]||''; }).join('').toUpperCase().slice(0,2)||'R';
}

// Récupère l'ID depuis ?id=xxx
function getParam(name) {
  var params = new URLSearchParams(window.location.search);
  return params.get(name);
}

var SUPABASE_URL = 'https://xtmuqlftisuliyeiwfmc.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0bXVxbGZ0aXN1bGl5ZWl3Zm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzg0OTUsImV4cCI6MjA4Nzk1NDQ5NX0.oWH0JrtE2J9OqbqOaII1Ni2gL4qDfzgLWR3rwTtjeiE';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadPost(id) {
  var { data, error } = await sb.from('articles').select('*').eq('id', id).single();
  if (error || !data) return null;
  return {
    id: data.id,
    title: data.title || '',
    subtitle: data.subtitle || '',
    category: data.category || '',
    author: data.author || 'Rédacteur',
    date: data.date || '',
    slug: data.slug || '',
    tags: data.tags ? data.tags.split(',').filter(Boolean) : [],
    seo: data.seo || '',
    cover: data.cover || '',
    content: data.content || { blocks: [] },
    sections: data.sections || {}
  };
}

function renderBlock(block) {
  var d = block.data || {};
  switch(block.type) {
    case 'paragraph':  return '<p>'+(d.text||'')+'</p>';
    case 'header':     var l=d.level||2; return '<h'+l+'>'+esc(d.text||'')+'</h'+l+'>';
    case 'list':
      var tag=d.style==='ordered'?'ol':'ul';
      var items=(d.items||[]).map(function(item){ var t=(typeof item==='object')?(item.content||item.text||''):item; return '<li>'+t+'</li>'; }).join('');
      return '<'+tag+'>'+items+'</'+tag+'>';
    case 'checklist':
      var cls=(d.items||[]).map(function(item){ return '<li class="'+(item.checked?'checked':'')+'">'+esc(item.text||item||'')+'</li>'; }).join('');
      return '<ul class="checklist">'+cls+'</ul>';
    case 'quote':      return '<blockquote>'+(d.text||'')+(d.caption?'<cite>'+esc(d.caption)+'</cite>':'')+'</blockquote>';
    case 'code':       return '<pre>'+esc(d.code||'')+'</pre>';
    case 'image':
      var url=(d.file&&d.file.url)?d.file.url:(d.url||'');
      return '<figure>'+(url?'<img src="'+esc(url)+'" alt="'+esc(d.caption||'')+'">':'')+(d.caption?'<figcaption>'+esc(d.caption)+'</figcaption>':'')+'</figure>';
    case 'table':
      if (!d.content||!d.content.length) return '';
      var rows=d.content.map(function(row,i){ return '<tr>'+row.map(function(cell){ return (i===0?'<th>':'<td>')+cell+(i===0?'</th>':'</td>'); }).join('')+'</tr>'; }).join('');
      return '<table><tbody>'+rows+'</tbody></table>';
    case 'embed':
      return '<figure><iframe src="'+esc(d.embed||'')+'" height="'+(d.height||320)+'" frameborder="0" allowfullscreen style="width:100%;border-radius:var(--radius);display:block;"></iframe>'+(d.caption?'<figcaption>'+esc(d.caption)+'</figcaption>':'')+'</figure>';
    case 'warning':    return '<div class="warning-block"><strong>'+esc(d.title||'Attention')+'</strong>'+esc(d.message||'')+'</div>';
    case 'delimiter':  return '<hr>';
    default: return '';
  }
}

function render(post) {
  var catColor = CAT_COLORS[post.category] || '#374151';
  var dateStr = formatDate(post.date);
  var ini = initials(post.author);
  var tags = Array.isArray(post.tags) ? post.tags : [];

  // Update page title
  document.title = (post.title || 'Article') + ' — CMS Studio';

  var html = '<div class="article-wrapper">';

  if (post.cover) html += '<img class="article-cover" src="'+esc(post.cover)+'" alt="">';

  html += '<div class="article-meta">';
  if (post.category) html += '<span class="article-category" style="background:'+catColor+'">'+esc(post.category)+'</span>';
  if (dateStr) html += '<span class="article-date">'+dateStr+'</span>';
  html += '</div>';

  html += '<h1 class="article-title">'+esc(post.title||'Sans titre')+'</h1>';
  if (post.subtitle) html += '<p class="article-subtitle">'+esc(post.subtitle)+'</p>';

  html += '<div class="article-byline">' +
    '<div class="byline-avatar">'+esc(ini)+'</div>' +
    '<div><div class="byline-name">'+esc(post.author||'Rédacteur')+'</div>'+(dateStr?'<div class="byline-date">'+dateStr+'</div>':'')+'</div>';
  if (tags.length) {
    html += '<div class="byline-tags">'+tags.map(function(t){ return '<span class="tag-pill">'+esc(t)+'</span>'; }).join('')+'</div>';
  }
  html += '</div>';

  var blocks = (post.content && post.content.blocks) ? post.content.blocks : [];
  html += '<div class="article-content">';
  if (blocks.length) {
    html += blocks.map(renderBlock).join('');
  } else {
    html += '<p style="color:var(--text-muted);font-style:italic;">Aucun contenu.</p>';
  }
  html += '</div>';

  // ── BANDEAU SECTIONS ──────────────────────────────────────────
  var SECTIONS = ['general', 'pedagogie', 'financier', 'marketing', 'commerce'];
  var LABELS = { general: 'Général', pedagogie: 'Pédagogie', financier: 'Financier', marketing: 'Marketing', commerce: 'Commerce' };

  var activeSections = SECTIONS.slice();

  var hasDocs = Array.isArray(post.documents) && post.documents.length > 0;

  if (true) {
    html += '<div class="section-tabs-bar">';
    html += '<div class="section-tabs-nav">';
    var firstActive = true;
    activeSections.forEach(function(name) {
      html += '<button class="section-tab-btn' + (firstActive ? ' active' : '') + '" onclick="switchSection(\'' + name + '\', this)">' + LABELS[name] + '</button>';
      firstActive = false;
    });
    if (hasDocs) {
      html += '<button class="section-tab-btn' + (firstActive ? ' active' : '') + '" onclick="switchSection(\'documents\', this)">📎 Documents</button>';
    }
    html += '</div>';

    firstActive = true;
    activeSections.forEach(function(name) {
      var sBlocks = (post.sections && post.sections[name] && post.sections[name].blocks) || [];
      html += '<div class="section-pane' + (firstActive ? ' active' : '') + '" id="section-pane-' + name + '">';
      html += '<div class="section-pane-title">' + LABELS[name] + '</div>';
      html += '<div class="article-content">' + sBlocks.map(renderBlock).join('') + '</div>';
      html += '</div>';
      firstActive = false;
    });

    if (hasDocs) {
      html += '<div class="section-pane' + (firstActive ? ' active' : '') + '" id="section-pane-documents">';
      html += '<div class="section-pane-title">Documents à télécharger</div>';
      html += '<div class="doc-download-list">';
      post.documents.forEach(function(doc, i) {
        var icon = getDocIcon(doc.type);
        var size = formatDocSize(doc.size);
        html += '<a class="doc-download-item" href="' + esc(doc.data) + '" download="' + esc(doc.name) + '">' +
          '<span class="doc-download-icon">' + icon + '</span>' +
          '<div class="doc-download-info"><div class="doc-download-name">' + esc(doc.name) + '</div><div class="doc-download-size">' + size + '</div></div>' +
          '<span class="doc-download-btn">⬇ Télécharger</span>' +
        '</a>';
      });
      html += '</div></div>';
    }

    html += '</div>';
  }

  html += '</div>';

  return html;
}

function showNotFound() {
  return '<div class="not-found">' +
    '<h2>Article introuvable</h2>' +
    '<p>Cet article n\'existe pas ou a été supprimé.</p>' +
    '<a href="blog.html" class="btn-back">← Retour au blog</a>' +
  '</div>';
}

// ── SWITCH SECTION ────────────────────────────────────────────
function switchSection(name, btn) {
  document.querySelectorAll('.section-pane').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.section-tab-btn').forEach(function(b) { b.classList.remove('active'); });
  var pane = document.getElementById('section-pane-' + name);
  if (pane) pane.classList.add('active');
  if (btn) btn.classList.add('active');
}
window.switchSection = switchSection;

// ── INIT ──────────────────────────────────────────────────────
var id = getParam('id');
var wrapper = document.getElementById('articleWrapper');

if (!id) {
  wrapper.innerHTML = showNotFound();
} else {
  wrapper.innerHTML = '<p style="text-align:center;padding:3rem;color:var(--text-muted);font-style:italic;">Chargement…</p>';
  loadPost(id).then(function(post) {
    if (post) {
      wrapper.innerHTML = render(post);
    } else {
      wrapper.innerHTML = showNotFound();
    }
  });
}

})();
</script>

<!-- PDF generation -->
<script>
function downloadPDF() {
  var btn = document.getElementById('pdfBtn');
  var wrapper = document.getElementById('articleWrapper');

  // Vérifier qu'un article est chargé
  if (!wrapper || !wrapper.querySelector('.article-wrapper')) {
    alert('Aucun article à exporter.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Génération…';

  // Récupérer le contenu de l'article
  var articleEl = wrapper.querySelector('.article-wrapper');
  var articleHTML = articleEl ? articleEl.outerHTML : wrapper.innerHTML;

  // Titre du fichier
  var docTitle = document.title.replace(' — CMS Studio', '') || 'Article';

  // Ouvrir une fenêtre d'impression dédiée
  var win = window.open('', '_blank', 'width=900,height=700');
  win.document.write('<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">');
  win.document.write('<title>' + docTitle + '</title>');
