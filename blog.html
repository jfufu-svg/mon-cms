<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CMS Studio — Blog</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8f7f4; --surface: #ffffff; --border: #e2ddd6;
      --text: #1a1814; --text-muted: #8a8278;
      --accent: #2c5282; --accent-light: #ebf0f8;
      --success: #276749;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Source Serif 4', Georgia, serif;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.09);
      --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
      --radius: 6px;
    }
    html { font-size: 16px; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── HEADER ── */
    .site-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
    .logo { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; }
    .nav-link { font-family: var(--font-body); font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-decoration: none; padding: 0.38rem 0.8rem; border-radius: var(--radius); border: 1px solid var(--border); transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.4rem; }
    .nav-link:hover { background: var(--bg); color: var(--text); border-color: #bbb; }

    /* ── HERO ── */
    .page-hero { background: var(--surface); border-bottom: 1px solid var(--border); padding: 3rem 2rem 2.5rem; text-align: center; }
    .page-hero-eyebrow { font-family: var(--font-body); font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 0.75rem; }
    .page-hero h1 { font-family: var(--font-display); font-size: 2.8rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text); line-height: 1.1; margin-bottom: 0.75rem; }
    .page-hero p { font-size: 1rem; color: var(--text-muted); font-style: italic; font-weight: 300; }
    .hero-sep { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-top: 1.5rem; }
    .hero-sep-line { width: 40px; height: 1px; background: var(--border); }
    .hero-sep-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

    /* ── FILTERS ── */
    .filters-bar { max-width: 1120px; margin: 2rem auto 0; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; }
    .section-heading { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .articles-count { font-size: 0.78rem; color: var(--text-muted); font-style: italic; margin-top: 2px; }
    .filter-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .filter-tag { font-family: var(--font-body); font-size: 0.72rem; font-weight: 600; padding: 0.25rem 0.65rem; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.05em; }
    .filter-tag:hover, .filter-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── GRID ── */
    .posts-grid { max-width: 1120px; margin: 1.5rem auto 4rem; padding: 0 2rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }

    /* ── CARD ── */
    .post-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow-sm); transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: pointer; text-decoration: none; display: block; color: inherit; animation: fadeInUp 0.4s ease both; }
    .post-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

    .card-thumb { width: 100%; aspect-ratio: 16/10; background: #e8e4de; overflow: hidden; position: relative; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; display: block; }
    .post-card:hover .card-thumb img { transform: scale(1.04); }
    .card-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #e8e4de 0%, #d4cfc8 100%); }

    .card-body { padding: 1.1rem 1.2rem 1rem; }
    .card-meta { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.7rem; flex-wrap: wrap; }
    .card-category { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 0.2rem 0.55rem; border-radius: 3px; color: #fff; flex-shrink: 0; }
    .card-date { font-size: 0.75rem; color: var(--text-muted); font-style: italic; }
    .card-title { font-family: var(--font-display); font-size: 1.05rem; font-weight: 700; line-height: 1.3; letter-spacing: -0.01em; color: var(--text); margin-bottom: 0.5rem; }
    .card-subtitle { font-size: 0.85rem; color: var(--text-muted); font-style: italic; line-height: 1.5; font-weight: 300; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .card-footer { padding: 0.6rem 1.2rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-author { font-size: 0.72rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem; }
    .author-avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--accent-light); border: 1px solid #c2d4ee; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .card-tags { display: flex; gap: 3px; flex-wrap: wrap; }
    .card-tag { font-size: 0.6rem; font-weight: 600; background: var(--accent-light); color: var(--accent); padding: 2px 5px; border-radius: 3px; }
    .card-read-more { font-size: 0.72rem; color: var(--accent); font-weight: 600; display: flex; align-items: center; gap: 0.3rem; transition: gap 0.15s; }
    .post-card:hover .card-read-more { gap: 0.55rem; }

    /* ── EMPTY STATE ── */
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 5rem 2rem; color: var(--text-muted); }
    .empty-state svg { margin-bottom: 1.2rem; opacity: 0.25; }
    .empty-state h3 { font-family: var(--font-display); font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--text); }
    .empty-state p { font-size: 0.9rem; font-style: italic; margin-bottom: 1.5rem; }
    .btn-primary { font-family: var(--font-body); font-size: 0.82rem; font-weight: 600; padding: 0.5rem 1.1rem; border-radius: var(--radius); background: var(--accent); color: #fff; border: none; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: background 0.15s; }
    .btn-primary:hover { background: #1e3a5f; }

    /* ── READER MODAL ── */
    .reader-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none; align-items: flex-start; justify-content: center; z-index: 200; backdrop-filter: blur(4px); overflow-y: auto; padding: 2rem 1rem; }
    .reader-overlay.open { display: flex; }
    .reader-modal { background: var(--surface); border-radius: 10px; box-shadow: var(--shadow-lg); width: 100%; max-width: 780px; display: flex; flex-direction: column; overflow: hidden; animation: modalIn 0.25s ease; margin: auto; }
    @keyframes modalIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .reader-header { padding: 0.9rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
    .reader-back { font-size: 0.8rem; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 0.35rem; border: none; background: none; font-family: var(--font-body); padding: 0.3rem 0.6rem; border-radius: var(--radius); transition: all 0.15s; }
    .reader-back:hover { background: var(--bg); color: var(--text); }
    .reader-brand { font-family: var(--font-display); font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem; }

    .reader-body { padding: 2.5rem 3rem 4rem; overflow-y: auto; }

    /* ── ARTICLE STYLES ── */
    .article-cover { width: 100%; aspect-ratio: 21/9; object-fit: cover; border-radius: var(--radius); margin-bottom: 2rem; display: block; }
    .article-meta { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .article-title { font-family: var(--font-display); font-size: 2.2rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 0.6rem; }
    .article-subtitle { font-size: 1.1rem; color: var(--text-muted); font-style: italic; font-weight: 300; margin-bottom: 1.5rem; line-height: 1.6; }
    .article-byline { display: flex; align-items: center; gap: 0.8rem; padding: 1rem 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 2rem; flex-wrap: wrap; }
    .byline-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-light); border: 2px solid #c2d4ee; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; color: var(--accent); flex-shrink: 0; }
    .byline-text { font-size: 0.82rem; }
    .byline-name { font-weight: 600; }
    .byline-date { color: var(--text-muted); font-style: italic; }

    .article-content p { font-size: 1.05rem; line-height: 1.85; margin-bottom: 1.3rem; }
    .article-content h1 { font-family: var(--font-display); font-size: 1.9rem; font-weight: 700; letter-spacing: -0.02em; margin: 2.5rem 0 0.8rem; }
    .article-content h2 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin: 2rem 0 0.65rem; }
    .article-content h3 { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; margin: 1.5rem 0 0.5rem; }
    .article-content h4 { font-family: var(--font-display); font-size: 1.05rem; font-weight: 700; margin: 1.2rem 0 0.4rem; }
    .article-content ul, .article-content ol { margin-bottom: 1.3rem; padding-left: 1.6rem; line-height: 1.85; }
    .article-content li { margin-bottom: 0.25rem; font-size: 1.05rem; }
    .article-content blockquote { border-left: 3px solid var(--accent); padding-left: 1.1rem; margin: 1.8rem 0; font-style: italic; color: #444; font-size: 1.1rem; }
    .article-content blockquote cite { display: block; font-size: 0.8rem; font-style: normal; color: var(--text-muted); margin-top: 0.4rem; }
    .article-content pre { background: #1e2433; color: #e2e8f0; padding: 1.2rem; border-radius: var(--radius); font-size: 0.875rem; overflow-x: auto; margin-bottom: 1.3rem; font-family: 'Courier New', monospace; }
    .article-content img { max-width: 100%; border-radius: var(--radius); display: block; margin: 1rem 0; }
    .article-content figure { margin-bottom: 1.3rem; }
    .article-content figcaption { font-size: 0.78rem; color: var(--text-muted); text-align: center; margin-top: 0.35rem; font-style: italic; }
    .article-content table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .article-content th { background: var(--bg); font-weight: 600; text-align: left; }
    .article-content th, .article-content td { border: 1px solid var(--border); padding: 0.5rem 0.75rem; }
    .article-content hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }
    .article-content .warning-block { background: #fffbec; border: 1px solid #f0d78c; border-radius: var(--radius); padding: 0.85rem 1rem; margin-bottom: 1.3rem; }
    .article-content .warning-block strong { display: block; margin-bottom: 0.25rem; }
    .article-content .checklist { list-style: none; padding: 0; margin-bottom: 1.3rem; }
    .article-content .checklist li { display: flex; align-items: flex-start; gap: 0.6rem; margin-bottom: 0.4rem; font-size: 1rem; line-height: 1.6; }
    .article-content .checklist li.checked { color: var(--text-muted); text-decoration: line-through; }

    /* ── FOOTER ── */
    .site-footer { margin-top: auto; background: var(--surface); border-top: 1px solid var(--border); text-align: center; padding: 1.2rem; font-size: 0.75rem; color: var(--text-muted); font-style: italic; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    @media (max-width: 900px) { .posts-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) {
      .posts-grid { grid-template-columns: 1fr; }
      .page-hero h1 { font-size: 2rem; }
      .reader-body { padding: 1.5rem; }
      .article-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="blog.html" class="logo"><span class="logo-dot"></span>CMS Studio</a>
  <a href="cms-editor.html" class="nav-link">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Back-office
  </a>
</header>

<section class="page-hero">
  <p class="page-hero-eyebrow">CMS Studio</p>
  <h1>Articles publiés</h1>
  <p>Retrouvez tous les articles rédigés et enregistrés depuis l'éditeur</p>
  <div class="hero-sep">
    <span class="hero-sep-line"></span>
    <span class="hero-sep-dot"></span>
    <span class="hero-sep-line"></span>
  </div>
</section>

<div class="filters-bar">
  <div>
    <div class="section-heading">Articles récents</div>
    <div class="articles-count" id="articlesCount"></div>
  </div>
  <div class="filter-tags" id="filterTags">
    <button class="filter-tag active" data-filter="all">Tous</button>
  </div>
</div>

<div class="posts-grid" id="postsGrid"></div>


<footer class="site-footer">CMS Studio &mdash; Tous droits réservés</footer>

<script>
(function() {
'use strict';

// ── CONFIG ────────────────────────────────────────────────────
var CAT_COLORS = {
  'Technologie': '#2563eb', 'Design': '#7c3aed', 'Culture': '#b45309',
  'Sciences': '#065f46', 'Societe': '#9d174d', 'Economie': '#1d4ed8'
};

// ── SUPABASE ──────────────────────────────────────────────────
var SUPABASE_URL = 'https://xtmuqlftisuliyeiwfmc.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0bXVxbGZ0aXN1bGl5ZWl3Zm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzg0OTUsImV4cCI6MjA4Nzk1NDQ5NX0.oWH0JrtE2J9OqbqOaII1Ni2gL4qDfzgLWR3rwTtjeiE';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ─────────────────────────────────────────────────────
var allPosts = [];
var currentFilter = 'all';

// ── LOAD POSTS ────────────────────────────────────────────────
async function loadPosts() {
  var { data, error } = await sb.from('articles').select('*').order('updated_at', { ascending: false });
  if (error) { console.error(error); return []; }
  return (data || []).map(function(row) {
    return {
      id: row.id,
      title: row.title || '',
      subtitle: row.subtitle || '',
      category: row.category || '',
      author: row.author || 'Rédacteur',
      date: row.date || '',
      slug: row.slug || '',
      tags: row.tags ? row.tags.split(',').filter(Boolean) : [],
      seo: row.seo || '',
      cover: row.cover || '',
      content: row.content || { blocks: [] },
      updatedAt: row.updated_at || ''
    };
  });
}

// ── FORMAT DATE ───────────────────────────────────────────────
function formatDate(str) {
  if (!str) return '';
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  try { var d = new Date(str); return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear(); }
  catch(e) { return str; }
}

// ── INITIALS ──────────────────────────────────────────────────
function initials(name) {
  return String(name || 'R').split(' ').map(function(w){ return w[0]||''; }).join('').toUpperCase().slice(0,2) || 'R';
}

// ── ESC HTML ──────────────────────────────────────────────────
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── RENDER FILTERS ────────────────────────────────────────────
function renderFilters() {
  var cats = {};
  allPosts.forEach(function(p){ if (p.category) cats[p.category] = true; });
  var bar = document.getElementById('filterTags');
  // clear existing category buttons (keep "Tous")
  Array.from(bar.querySelectorAll('[data-filter]:not([data-filter="all"])')).forEach(function(b){ b.remove(); });
  Object.keys(cats).forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = 'filter-tag' + (currentFilter === cat ? ' active' : '');
    btn.textContent = cat;
    btn.setAttribute('data-filter', cat);
    btn.addEventListener('click', function(){ setFilter(cat); });
    bar.appendChild(btn);
  });
  bar.querySelector('[data-filter="all"]').addEventListener('click', function(){ setFilter('all'); });
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tag').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-filter') === filter);
  });
  renderGrid();
}

// ── RENDER GRID ───────────────────────────────────────────────
function renderGrid() {
  var grid = document.getElementById('postsGrid');
  grid.innerHTML = '';

  var filtered = currentFilter === 'all'
    ? allPosts
    : allPosts.filter(function(p){ return p.category === currentFilter; });

  // Sort newest first (by updatedAt or date)
  filtered = filtered.slice().sort(function(a,b){
    var da = a.updatedAt || a.date || '';
    var db = b.updatedAt || b.date || '';
    return db.localeCompare(da);
  });

  document.getElementById('articlesCount').textContent =
    filtered.length + ' article' + (filtered.length > 1 ? 's' : '');

  if (!filtered.length) {
    var empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML =
      '<svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">' +
        '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>' +
        '<polyline points="14 2 14 8 20 8"/>' +
        '<line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>' +
      '</svg>' +
      '<h3>Aucun article publié</h3>' +
      '<p>Rédigez et enregistrez votre premier article depuis le back-office.</p>' +
      '<a href="cms-editor.html" class="btn-primary">&#9998; Ouvrir l\'éditeur</a>';
    grid.appendChild(empty);
    return;
  }

  filtered.forEach(function(post, i) {
    var card = buildCard(post, i);
    card.href = 'article.html?id=' + encodeURIComponent(post.id);
    grid.appendChild(card);
  });
}

// ── BUILD CARD ────────────────────────────────────────────────
function buildCard(post, index) {
  var catColor = CAT_COLORS[post.category] || '#374151';
  var tags = Array.isArray(post.tags) ? post.tags : [];
  var ini = initials(post.author);
  var dateStr = formatDate(post.date);

  var card = document.createElement('a');
  card.className = 'post-card';
  card.href = '#';
  card.style.animationDelay = (index * 70) + 'ms';

  var thumbHtml = post.cover
    ? '<img src="' + esc(post.cover) + '" alt="" loading="lazy" onerror="this.parentNode.innerHTML=\'<div class=card-thumb-placeholder><svg width=40 height=40 viewBox=\\\'0 0 24 24\\\' fill=none stroke=#aaa stroke-width=1.5><rect x=3 y=3 width=18 height=18 rx=2/><circle cx=8.5 cy=8.5 r=1.5/><polyline points=\\\'21 15 16 10 5 21\\\'/></svg></div>\'">'
    : '<div class="card-thumb-placeholder"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>';

  var tagsHtml = tags.slice(0,3).map(function(t){ return '<span class="card-tag">'+esc(t)+'</span>'; }).join('');
  var rightSide = tagsHtml
    ? '<div class="card-tags">'+tagsHtml+'</div>'
    : '<span class="card-read-more">Lire <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>';

  card.innerHTML =
    '<div class="card-thumb">' + thumbHtml + '</div>' +
    '<div class="card-body">' +
      '<div class="card-meta">' +
        (post.category ? '<span class="card-category" style="background:'+catColor+'">'+esc(post.category)+'</span>' : '') +
        (dateStr ? '<span class="card-date">'+dateStr+'</span>' : '') +
      '</div>' +
      '<div class="card-title">'+esc(post.title||'Sans titre')+'</div>' +
      (post.subtitle ? '<div class="card-subtitle">'+esc(post.subtitle)+'</div>' : '') +
    '</div>' +
    '<div class="card-footer">' +
      '<div class="card-author"><div class="author-avatar">'+esc(ini)+'</div>'+esc(post.author||'Rédacteur')+'</div>' +
      rightSide +
    '</div>';

  return card;
}



// ── INIT ──────────────────────────────────────────────────────
loadPosts().then(function(posts) {
  allPosts = posts;
  renderFilters();
  renderGrid();
});

// Refresh si retour depuis l'éditeur
window.addEventListener('focus', function() {
  loadPosts().then(function(fresh) {
    if (JSON.stringify(fresh) !== JSON.stringify(allPosts)) {
      allPosts = fresh;
      renderFilters();
      renderGrid();
    }
  });
});

})();
</script>
